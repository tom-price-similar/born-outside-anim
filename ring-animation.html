<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Monogram Ring Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: url('BG.jpg') no-repeat center center / cover fixed;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #222;
  }

  .stage {
    width: 520px;
    height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
  }

  svg#canvas { width: 100%; height: 100%; }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 16px;
    max-width: 500px;
    width: 100%;
  }

  .preset-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 4px;
  }

  .preset-btn {
    padding: 6px 12px;
    border: 2px solid #222;
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
    border-radius: 4px;
  }

  .preset-btn:hover { background: #222; color: white; }
  .preset-btn.active { background: #222; color: white; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.45;
    margin-top: 6px;
    align-self: flex-start;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    width: 100%;
  }

  .control-row label {
    min-width: 50px;
    font-size: 11px;
  }

  .control-row input[type="range"] {
    flex: 1;
    accent-color: #222;
    height: 16px;
  }

  .control-row .val {
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    opacity: 0.6;
  }

  .ring-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
    width: 100%;
  }

  .ring-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ring-col .section-label { margin-top: 0; }

  .bg-toggle {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .bg-toggle button {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid #ccc;
    cursor: pointer;
  }

  .bg-toggle button.active { border-color: #222; border-width: 3px; }
  .bg-light { background: #f5f5f5; }
  .bg-dark { background: #111; }
  .bg-white { background: #fff; }

  body.dark { background: #111; color: #eee; }
  body.dark .preset-btn { border-color: #eee; background: transparent; color: #eee; }
  body.dark .preset-btn:hover, body.dark .preset-btn.active { background: #eee; color: #111; }
  body.dark .control-row input[type="range"] { accent-color: #eee; }
  body.white-bg { background: #fff; }

  .saved-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    width: 100%;
    min-height: 20px;
  }

  .saved-preset {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1.5px solid #999;
    background: white;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .saved-preset:hover { border-color: #222; }
  .saved-preset .del { opacity: 0.3; font-size: 13px; margin-left: 2px; }
  .saved-preset .del:hover { opacity: 1; color: #c00; }

  body.dark .saved-preset { background: transparent; border-color: #666; color: #eee; }
  body.dark .saved-preset:hover { border-color: #eee; }

  .save-btn {
    padding: 6px 14px;
    border: 2px solid #222;
    background: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .save-btn:hover { background: #222; color: white; }
  body.dark .save-btn { border-color: #eee; background: transparent; color: #eee; }
  body.dark .save-btn:hover { background: #eee; color: #111; }

  .download-btn {
    padding: 10px 24px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    border-radius: 5px;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .download-btn:hover { opacity: 0.8; }
  body.dark .download-btn { background: #eee; color: #111; }

  h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 24px;
  }
</style>
</head>
<body>

<h1>Ring Animation Explorer</h1>

<div class="stage">
  <svg id="canvas" viewBox="0 0 710 681" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="controls">
  <div class="preset-buttons">
    <button class="preset-btn" data-preset="0">V1</button>
    <button class="preset-btn" data-preset="1">V2</button>
    <button class="preset-btn active" data-preset="2">V4</button>
    <button class="preset-btn" data-preset="3">V5 Spinning</button>
  </div>

  <div class="ring-grid">
    <!-- Outer Solid -->
    <div class="ring-col">
      <div class="section-label">Outer Solid</div>
      <div class="control-row">
        <label>X Tilt</label>
        <input type="range" data-key="oSolidX" min="-90" max="90" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row">
        <label>Y Tilt</label>
        <input type="range" data-key="oSolidY" min="-90" max="90" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row">
        <label>Z Tilt</label>
        <input type="range" data-key="oSolidZ" min="-180" max="180" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
    </div>

    <!-- Centre Solid -->
    <div class="ring-col">
      <div class="section-label">Centre Solid</div>
      <div class="control-row">
        <label>Z Spin</label>
        <input type="range" data-key="cSolidZSpn" min="-2" max="2" step="0.05" value="0">
        <span class="val">0</span>
      </div>
      <div class="control-row">
        <label>X Tilt</label>
        <input type="range" data-key="cSolidX" min="-90" max="90" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row">
        <label>Y Tilt</label>
        <input type="range" data-key="cSolidY" min="-90" max="90" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row">
        <label>Z Tilt</label>
        <input type="range" data-key="cSolidZ" min="-180" max="180" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row">
        <label>Fill</label>
        <input type="range" data-key="cSolidFill" min="0" max="1" step="0.05" value="1">
        <span class="val">1.0</span>
      </div>
      <div class="section-label" style="margin-top:6px;font-size:10px;opacity:0.6">Y Ping-Pong</div>
      <div class="control-row">
        <label>On/Off</label>
        <input type="range" data-key="cSolidPPOn" min="0" max="1" step="1" value="0">
        <span class="val">Off</span>
      </div>
      <div class="control-row">
        <label>Min Y</label>
        <input type="range" data-key="cSolidPPMin" min="-90" max="90" step="1" value="-30">
        <span class="val">-30&deg;</span>
      </div>
      <div class="control-row">
        <label>Max Y</label>
        <input type="range" data-key="cSolidPPMax" min="-90" max="90" step="1" value="30">
        <span class="val">30&deg;</span>
      </div>
      <div class="control-row">
        <label>Speed</label>
        <input type="range" data-key="cSolidPPSpd" min="0.05" max="3" step="0.05" value="0.5">
        <span class="val">0.5</span>
      </div>
      <div class="control-row">
        <label>Easing</label>
        <select data-key="cSolidPPEase" style="flex:1;font-size:11px;padding:2px 4px;">
          <option value="linear">Linear</option>
          <option value="easeInOut" selected>Ease In-Out</option>
          <option value="easeIn">Ease In</option>
          <option value="easeOut">Ease Out</option>
          <option value="easeInOutCubic">Cubic In-Out</option>
          <option value="easeInOutElastic">Elastic</option>
        </select>
        <span class="val">easeInOut</span>
      </div>
    </div>

    <!-- Mask Offset -->
    <div class="ring-col">
      <div class="section-label">Mask Offset</div>
      <div class="control-row">
        <label>X Shift</label>
        <input type="range" data-key="maskOffX" min="-200" max="200" step="1" value="0">
        <span class="val">0</span>
      </div>
      <div class="control-row">
        <label>Y Shift</label>
        <input type="range" data-key="maskOffY" min="-200" max="200" step="1" value="0">
        <span class="val">0</span>
      </div>
      <div class="control-row">
        <label>RX Scale</label>
        <input type="range" data-key="maskScaleRX" min="0.5" max="1.5" step="0.01" value="1">
        <span class="val">1.00</span>
      </div>
      <div class="control-row">
        <label>RY Scale</label>
        <input type="range" data-key="maskScaleRY" min="0.5" max="1.5" step="0.01" value="1">
        <span class="val">1.00</span>
      </div>
      <div class="control-row">
        <label>Rotation</label>
        <input type="range" data-key="maskRotOff" min="-180" max="180" step="1" value="0">
        <span class="val">0&deg;</span>
      </div>
      <div class="control-row" style="justify-content:center">
        <button class="save-btn" id="copyStateBtn" style="font-size:10px;padding:4px 10px;">Copy All Settings</button>
      </div>
    </div>

    <!-- Outer Dashed -->
    <div class="ring-col">
      <div class="section-label">Outer Dashed</div>
      <div class="control-row">
        <label>Dash Spd</label>
        <input type="range" data-key="oDashSpd" min="-3" max="3" step="0.1" value="-0.3">
        <span class="val">-0.3</span>
      </div>
      <div class="control-row">
        <label>Z Spin</label>
        <input type="range" data-key="oDashZSpn" min="-2" max="2" step="0.05" value="0">
        <span class="val">0</span>
      </div>
      <div class="control-row">
        <label>X Tilt</label>
        <input type="range" data-key="oDashX" min="-90" max="90" step="1" value="48">
        <span class="val">48&deg;</span>
      </div>
      <div class="control-row">
        <label>Y Tilt</label>
        <input type="range" data-key="oDashY" min="-90" max="90" step="1" value="-10">
        <span class="val">-10&deg;</span>
      </div>
      <div class="control-row">
        <label>Z Tilt</label>
        <input type="range" data-key="oDashZTlt" min="-180" max="180" step="1" value="73">
        <span class="val">73&deg;</span>
      </div>
      <div class="control-row">
        <label>Dash</label>
        <input type="range" data-key="oDashLen" min="10" max="100" step="1" value="21">
        <span class="val">21</span>
      </div>
      <div class="control-row">
        <label>Gap</label>
        <input type="range" data-key="oDashGap" min="5" max="80" step="1" value="28">
        <span class="val">28</span>
      </div>
    </div>

    <!-- Centre Dashed -->
    <div class="ring-col">
      <div class="section-label">Centre Dashed</div>
      <div class="control-row">
        <label>Dash Spd</label>
        <input type="range" data-key="cDashSpd" min="-3" max="3" step="0.1" value="0.3">
        <span class="val">0.3</span>
      </div>
      <div class="control-row">
        <label>Z Spin</label>
        <input type="range" data-key="cDashZSpn" min="-2" max="2" step="0.05" value="0">
        <span class="val">0</span>
      </div>
      <div class="control-row">
        <label>X Tilt</label>
        <input type="range" data-key="cDashX" min="-90" max="90" step="1" value="-31">
        <span class="val">-31&deg;</span>
      </div>
      <div class="control-row">
        <label>Y Tilt</label>
        <input type="range" data-key="cDashY" min="-90" max="90" step="1" value="17">
        <span class="val">17&deg;</span>
      </div>
      <div class="control-row">
        <label>Z Tilt</label>
        <input type="range" data-key="cDashZTlt" min="-180" max="180" step="1" value="99">
        <span class="val">99&deg;</span>
      </div>
      <div class="control-row">
        <label>Dash</label>
        <input type="range" data-key="cDashLen" min="10" max="100" step="1" value="21">
        <span class="val">21</span>
      </div>
      <div class="control-row">
        <label>Gap</label>
        <input type="range" data-key="cDashGap" min="5" max="80" step="1" value="28">
        <span class="val">28</span>
      </div>
    </div>
  </div>

  <div class="section-label">Saved Presets</div>
  <div class="saved-presets" id="savedPresets"></div>
  <div class="control-row">
    <button class="save-btn" id="savePresetBtn">Save Current</button>
  </div>

  <div class="control-row" style="margin-top:8px">
    <span>Background:</span>
    <div class="bg-toggle">
      <button class="bg-light active" data-bg="light"></button>
      <button class="bg-white" data-bg="white"></button>
      <button class="bg-dark" data-bg="dark"></button>
    </div>
  </div>

  <button class="download-btn" id="downloadBtn">Download Animated SVG</button>
</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const canvas = document.getElementById('canvas');

const CX = 354.813, CY = 340.426;
const SRX = 353.4, SRY = 339.0;
const DEG = Math.PI / 180;

// Base normals (before any tilt)
const OUTER_BASE = [0, 0, 1];
const nz0 = 0.282, r0 = Math.sqrt(1 - nz0*nz0), phi0 = 64.5 * DEG;
const DIAG_BASE = [-r0*Math.sin(phi0), r0*Math.cos(phi0), nz0];

let isDark = false;
const STROKE_W = 3; // fixed weight for all rings

// Z spin accumulators (radians)
let oDashZAngle = 0;
let cDashZAngle = 0;
let cSolidZAngle = 0;

let dashOffsets = { oDash: 0, cDash: 0 };

// Ping-pong phase accumulator (0→1→0→1…)
let ppPhase = 0;
let ppDir = 1; // 1 = going up, -1 = going down

let state = {
  oSolidX: 0, oSolidY: 0, oSolidZ: 0,
  cSolidZSpn: 0, cSolidX: 0, cSolidY: 0, cSolidZ: 0, cSolidFill: 1,
  cSolidPPOn: 0, cSolidPPMin: -30, cSolidPPMax: 30, cSolidPPSpd: 0.5, cSolidPPEase: 'easeInOut',
  maskOffX: 0, maskOffY: 0, maskScaleRX: 1, maskScaleRY: 1, maskRotOff: 0,
  oDashSpd: -0.3, oDashZSpn: 0, oDashX: 48, oDashY: -10, oDashZTlt: 73, oDashLen: 21, oDashGap: 28,
  cDashSpd: 0.3, cDashZSpn: 0, cDashX: -31, cDashY: 17, cDashZTlt: 99, cDashLen: 21, cDashGap: 28,
};

const PRESET_KEYS = Object.keys(state);

const PP_DEFAULTS = { cSolidPPOn:0, cSolidPPMin:-30, cSolidPPMax:30, cSolidPPSpd:0.5, cSolidPPEase:'easeInOut' };
const MASK_DEFAULTS = { maskOffX:0, maskOffY:0, maskScaleRX:1, maskScaleRY:1, maskRotOff:0 };

const PRESETS = [
  // V1
  { oSolidX:0,oSolidY:0,oSolidZ:0, cSolidZSpn:0,cSolidX:0,cSolidY:0,cSolidZ:1,cSolidFill:1, ...PP_DEFAULTS, ...MASK_DEFAULTS,
    oDashSpd:-0.7,oDashZSpn:0,oDashX:48,oDashY:-10,oDashZTlt:79,oDashLen:26,oDashGap:30,
    cDashSpd:-0.8,cDashZSpn:0,cDashX:-31,cDashY:17,cDashZTlt:108,cDashLen:26,cDashGap:30 },
  // V2
  { oSolidX:0,oSolidY:0,oSolidZ:0, cSolidZSpn:0,cSolidX:0,cSolidY:0,cSolidZ:1,cSolidFill:1, ...PP_DEFAULTS, ...MASK_DEFAULTS,
    oDashSpd:-0.7,oDashZSpn:0,oDashX:48,oDashY:-10,oDashZTlt:73,oDashLen:26,oDashGap:30,
    cDashSpd:-0.8,cDashZSpn:0,cDashX:-31,cDashY:17,cDashZTlt:99,cDashLen:26,cDashGap:30 },
  // V4
  { oSolidX:0,oSolidY:0,oSolidZ:0, cSolidZSpn:0,cSolidX:0,cSolidY:0,cSolidZ:1,cSolidFill:1, ...PP_DEFAULTS, ...MASK_DEFAULTS,
    oDashSpd:-0.3,oDashZSpn:0,oDashX:48,oDashY:-10,oDashZTlt:73,oDashLen:21,oDashGap:28,
    cDashSpd:0.3,cDashZSpn:0,cDashX:-31,cDashY:17,cDashZTlt:99,cDashLen:21,cDashGap:28 },
  // V5 Spinning
  { oSolidX:0,oSolidY:0,oSolidZ:0, cSolidZSpn:0,cSolidX:17,cSolidY:-18.34,cSolidZ:1,cSolidFill:1,
    cSolidPPOn:1,cSolidPPMin:-37,cSolidPPMax:-17,cSolidPPSpd:0.5,cSolidPPEase:'easeInOut', ...MASK_DEFAULTS,
    oDashSpd:-0.3,oDashZSpn:0,oDashX:46,oDashY:-2,oDashZTlt:73,oDashLen:21,oDashGap:28,
    cDashSpd:0.3,cDashZSpn:0,cDashX:-31,cDashY:18,cDashZTlt:99,cDashLen:21,cDashGap:28 },
];

// 3D helpers
function rotXn(n, a) { const c=Math.cos(a),s=Math.sin(a); return [n[0],n[1]*c-n[2]*s,n[1]*s+n[2]*c]; }
function rotYn(n, a) { const c=Math.cos(a),s=Math.sin(a); return [n[0]*c+n[2]*s,n[1],-n[0]*s+n[2]*c]; }
function rotZn(n, a) { const c=Math.cos(a),s=Math.sin(a); return [n[0]*c-n[1]*s,n[0]*s+n[1]*c,n[2]]; }
function normV(n) { const l=Math.sqrt(n[0]*n[0]+n[1]*n[1]+n[2]*n[2]); return [n[0]/l,n[1]/l,n[2]/l]; }

// Compute normal from base + static X/Y/Z tilt (degrees) + accumulated Z spin (radians)
function computeNormal(base, xDeg, yDeg, zTiltDeg, zSpinRad) {
  let n = [...base];
  n = rotXn(n, xDeg * DEG);
  n = rotYn(n, yDeg * DEG);
  n = rotZn(n, zTiltDeg * DEG); // static Z tilt
  n = rotZn(n, zSpinRad);       // continuous Z spin
  return normV(n);
}

function projectRing(normal) {
  const nx=normal[0], ny=normal[1], nz=normal[2];
  const s = Math.sqrt(nx*nx + ny*ny);
  let ux, uy, vx, vy;

  if (s > 0.001) {
    ux=ny/s; uy=-nx/s;
    vx=nz*nx/s; vy=nz*ny/s;
  } else {
    ux=1; uy=0; vx=0; vy=nz>0?1:-1;
  }

  const m11=SRX*ux, m12=SRX*vx, m21=SRY*uy, m22=SRY*vy;
  const a=m11*m11+m12*m12, b=m11*m21+m12*m22, c=m21*m21+m22*m22;
  const trace=a+c, det=a*c-b*b;
  const disc=Math.sqrt(Math.max(0,trace*trace/4-det));
  const l1=trace/2+disc, l2=trace/2-disc;

  let angle;
  if (Math.abs(b)>0.0001) angle=Math.atan2(l1-a,b);
  else angle=a>=c?0:Math.PI/2;

  return { rx:Math.sqrt(l1), ry:Math.sqrt(Math.max(0,l2)), angle:angle*180/Math.PI };
}

// SVG elements
let els = {};

function buildSVG() {
  const stroke = '#fff';
  canvas.innerHTML = '';

  // Create mask — white rect (show all) + black ellipse (hide behind centre solid)
  const defs = document.createElementNS(SVG_NS, 'defs');
  const mask = document.createElementNS(SVG_NS, 'mask');
  mask.setAttribute('id', 'centerMask');
  // Use userSpaceOnUse so mask region and content use SVG viewBox coordinates
  mask.setAttribute('maskUnits', 'userSpaceOnUse');
  mask.setAttribute('maskContentUnits', 'userSpaceOnUse');
  mask.setAttribute('x', '0');
  mask.setAttribute('y', '0');
  mask.setAttribute('width', '710');
  mask.setAttribute('height', '681');
  const maskRect = document.createElementNS(SVG_NS, 'rect');
  maskRect.setAttribute('x', '0');
  maskRect.setAttribute('y', '0');
  maskRect.setAttribute('width', '710');
  maskRect.setAttribute('height', '681');
  maskRect.setAttribute('fill', 'white');
  mask.appendChild(maskRect);
  // Black ellipse — same element type as centre solid, updated via setProj
  els.maskEllipse = document.createElementNS(SVG_NS, 'ellipse');
  els.maskEllipse.setAttribute('fill', 'black');
  mask.appendChild(els.maskEllipse);
  defs.appendChild(mask);

  // ClipPath to constrain dashed rings within the outer solid boundary
  const boundsClip = document.createElementNS(SVG_NS, 'clipPath');
  boundsClip.setAttribute('id', 'sphereBounds');
  els.boundsEllipse = document.createElementNS(SVG_NS, 'ellipse');
  boundsClip.appendChild(els.boundsEllipse);
  defs.appendChild(boundsClip);

  canvas.appendChild(defs);

  els.oSolid = makeEl(stroke, 'none');
  els.oDash  = makeEl(stroke, 'none', true, state.oDashLen, state.oDashGap);
  els.cDash  = makeEl(stroke, 'none', true, state.cDashLen, state.cDashGap);

  // Apply sphere bounds clip + centre solid mask to dashed ellipses
  // Wrap each in a group so we can apply both clip and mask
  const oDashGroup = document.createElementNS(SVG_NS, 'g');
  oDashGroup.setAttribute('clip-path', 'url(#sphereBounds)');
  oDashGroup.setAttribute('mask', 'url(#centerMask)');
  canvas.removeChild(els.oDash);
  oDashGroup.appendChild(els.oDash);
  canvas.appendChild(oDashGroup);

  const cDashGroup = document.createElementNS(SVG_NS, 'g');
  cDashGroup.setAttribute('clip-path', 'url(#sphereBounds)');
  cDashGroup.setAttribute('mask', 'url(#centerMask)');
  canvas.removeChild(els.cDash);
  cDashGroup.appendChild(els.cDash);
  canvas.appendChild(cDashGroup);

  // Centre solid on top — stroke only, no fill
  els.cSolid = makeEl(stroke, 'none');
}

function makeEl(stroke, fill, dashed, dl, dg) {
  const el = document.createElementNS(SVG_NS, 'ellipse');
  el.setAttribute('fill', fill);
  el.setAttribute('stroke', stroke);
  el.setAttribute('stroke-width', STROKE_W);
  if (dashed) {
    el.setAttribute('stroke-linecap', 'round');
    el.setAttribute('stroke-dasharray', `${dl} ${dg}`);
  }
  canvas.appendChild(el);
  return el;
}

function setProj(el, proj) {
  el.setAttribute('cx', CX);
  el.setAttribute('cy', CY);
  el.setAttribute('rx', proj.rx);
  el.setAttribute('ry', proj.ry);
  el.setAttribute('transform', `rotate(${proj.angle} ${CX} ${CY})`);
}

// Build an SVG path "d" string for an ellipse using arc commands (exact match to <ellipse>)
function ellipsePath(proj) {
  const a = proj.angle * DEG;
  const cosA = Math.cos(a), sinA = Math.sin(a);
  // Start point: rightmost point of the unrotated ellipse, then rotated
  const sx = CX + proj.rx * cosA;
  const sy = CY + proj.rx * sinA;
  // Opposite point: leftmost point
  const ex = CX - proj.rx * cosA;
  const ey = CY - proj.rx * sinA;
  const r = proj.rx.toFixed(2);
  const rr = proj.ry.toFixed(2);
  const ang = proj.angle.toFixed(2);
  // Two half-ellipse arcs = full ellipse
  return `M${sx.toFixed(2)},${sy.toFixed(2)} A${r} ${rr} ${ang} 1 0 ${ex.toFixed(2)},${ey.toFixed(2)} A${r} ${rr} ${ang} 1 0 ${sx.toFixed(2)},${sy.toFixed(2)} Z`;
}

// Build clip path: full rect with ellipse hole (evenodd)
function updateClipPath(proj) {
  const rect = `M0,0 H710 V681 H0 Z`;
  const hole = ellipsePath(proj);
  els.clipPath.setAttribute('d', rect + ' ' + hole);
}

// Easing functions (t goes 0→1, returns 0→1)
const EASINGS = {
  linear: t => t,
  easeIn: t => t * t,
  easeOut: t => t * (2 - t),
  easeInOut: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t,
  easeInOutCubic: t => t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  easeInOutElastic: t => {
    if (t === 0 || t === 1) return t;
    const c = (2*Math.PI)/4.5;
    return t < 0.5
      ? -(Math.pow(2,20*t-10)*Math.sin((20*t-11.125)*c))/2
      : (Math.pow(2,-20*t+10)*Math.sin((20*t-11.125)*c))/2+1;
  },
};

// Animation
let lastTime = 0;
function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  // Advance Z spin angles (continuous)
  oDashZAngle += state.oDashZSpn * 0.5 * dt;
  cDashZAngle += state.cDashZSpn * 0.5 * dt;
  cSolidZAngle += state.cSolidZSpn * 0.5 * dt;

  // Y tilt ping-pong for centre solid
  if (state.cSolidPPOn) {
    ppPhase += ppDir * state.cSolidPPSpd * dt;
    if (ppPhase >= 1) { ppPhase = 1; ppDir = -1; }
    else if (ppPhase <= 0) { ppPhase = 0; ppDir = 1; }
    const easeFn = EASINGS[state.cSolidPPEase] || EASINGS.easeInOut;
    const eased = easeFn(ppPhase);
    state.cSolidY = state.cSolidPPMin + eased * (state.cSolidPPMax - state.cSolidPPMin);
    // Update the Y Tilt slider to reflect current value
    const ySlider = document.querySelector('[data-key="cSolidY"]');
    if (ySlider) {
      ySlider.value = state.cSolidY;
      ySlider.nextElementSibling.innerHTML = Math.round(state.cSolidY) + '&deg;';
    }
  }

  // Advance dash offsets — wrap at pattern period to prevent glitch
  dashOffsets.oDash += state.oDashSpd * 60 * dt;
  dashOffsets.cDash += state.cDashSpd * 60 * dt;
  const oPeriod = state.oDashLen + state.oDashGap;
  const cPeriod = state.cDashLen + state.cDashGap;
  if (oPeriod > 0) dashOffsets.oDash = ((dashOffsets.oDash % oPeriod) + oPeriod) % oPeriod;
  if (cPeriod > 0) dashOffsets.cDash = ((dashOffsets.cDash % cPeriod) + cPeriod) % cPeriod;

  // Compute normals
  const oSolidN = computeNormal(OUTER_BASE, state.oSolidX, state.oSolidY, state.oSolidZ, 0);
  const oDashN  = computeNormal(OUTER_BASE, state.oDashX, state.oDashY, state.oDashZTlt, oDashZAngle);
  const cSolidN = computeNormal(DIAG_BASE, state.cSolidX, state.cSolidY, state.cSolidZ, cSolidZAngle);
  const cDashN  = computeNormal(DIAG_BASE, state.cDashX, state.cDashY, state.cDashZTlt, cDashZAngle);

  // Update SVG
  const oSolidProj = projectRing(oSolidN);
  setProj(els.oSolid, oSolidProj);
  // Keep sphere bounds clip in sync with outer solid
  setProj(els.boundsEllipse, oSolidProj);

  setProj(els.oDash, projectRing(oDashN));
  els.oDash.setAttribute('stroke-dasharray', `${state.oDashLen} ${state.oDashGap}`);
  els.oDash.setAttribute('stroke-dashoffset', dashOffsets.oDash);

  setProj(els.cDash, projectRing(cDashN));
  els.cDash.setAttribute('stroke-dasharray', `${state.cDashLen} ${state.cDashGap}`);
  els.cDash.setAttribute('stroke-dashoffset', dashOffsets.cDash);

  // Centre solid — stroke only, no fill
  const cSolidProj = projectRing(cSolidN);
  setProj(els.cSolid, cSolidProj);
  els.cSolid.setAttribute('fill', 'none');

  // Update mask ellipse — match centre solid but with user-adjustable offsets
  const maskProj = {
    rx: cSolidProj.rx * state.maskScaleRX,
    ry: cSolidProj.ry * state.maskScaleRY,
    angle: cSolidProj.angle + state.maskRotOff
  };
  els.maskEllipse.setAttribute('cx', CX + state.maskOffX);
  els.maskEllipse.setAttribute('cy', CY + state.maskOffY);
  els.maskEllipse.setAttribute('rx', maskProj.rx);
  els.maskEllipse.setAttribute('ry', maskProj.ry);
  els.maskEllipse.setAttribute('transform', `rotate(${maskProj.angle} ${CX + state.maskOffX} ${CY + state.maskOffY})`);
  els.maskEllipse.setAttribute('fill-opacity', state.cSolidFill);

  requestAnimationFrame(animate);
}

// Controls — range inputs
document.querySelectorAll('.control-row input[type="range"]').forEach(input => {
  const key = input.dataset.key;
  if (!key) return;
  input.addEventListener('input', () => {
    const val = parseFloat(input.value);
    state[key] = val;
    if (key === 'cSolidPPOn') {
      input.nextElementSibling.textContent = val ? 'On' : 'Off';
      if (val) { ppPhase = 0; ppDir = 1; }
    } else {
      const isDeg = key.match(/SolidX|SolidY|SolidZ|DashX|DashY|DashZTlt|PPMin|PPMax|maskRotOff/) && !key.match(/Spd|Spn|Len|Gap|Fill|Scale|Off[XY]/);
      if (isDeg) {
        input.nextElementSibling.innerHTML = val + '&deg;';
      } else {
        input.nextElementSibling.textContent = Number.isInteger(val) ? val : val.toFixed(1);
      }
    }
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
});

// Controls — select dropdowns
document.querySelectorAll('.control-row select').forEach(sel => {
  const key = sel.dataset.key;
  if (!key) return;
  sel.addEventListener('change', () => {
    state[key] = sel.value;
    sel.nextElementSibling.textContent = sel.value;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
});

function applyPreset(i) {
  const p = PRESETS[i];
  for (const key of PRESET_KEYS) {
    if (p[key] === undefined) continue;
    state[key] = p[key];
  }
  syncAllSliders();
  // Reset accumulators
  oDashZAngle = 0;
  cDashZAngle = 0;
  cSolidZAngle = 0;
  ppPhase = 0;
  ppDir = 1;
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyPreset(parseInt(btn.dataset.preset));
  });
});

document.querySelectorAll('.bg-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.body.className = '';
    isDark = btn.dataset.bg === 'dark';
    if (isDark) document.body.classList.add('dark');
    if (btn.dataset.bg === 'white') document.body.classList.add('white-bg');
    buildSVG();
  });
});

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  const stroke = '#fff';
  const solidFill = isDark ? '#111' : '#fff';
  const bg = isDark ? '#111' : 'none';

  const oSolidN = computeNormal(OUTER_BASE, state.oSolidX, state.oSolidY, state.oSolidZ, 0);
  const oDashN  = computeNormal(OUTER_BASE, state.oDashX, state.oDashY, state.oDashZTlt, oDashZAngle);
  const cSolidN = computeNormal(DIAG_BASE, state.cSolidX, state.cSolidY, state.cSolidZ, cSolidZAngle);
  const cDashN  = computeNormal(DIAG_BASE, state.cDashX, state.cDashY, state.cDashZTlt, cDashZAngle);

  function tag(normal, fill, dashed, dl, dg, spd, masked) {
    const p = projectRing(normal);
    let a = `cx="${CX}" cy="${CY}" rx="${p.rx.toFixed(2)}" ry="${p.ry.toFixed(2)}"
    transform="rotate(${p.angle.toFixed(2)} ${CX} ${CY})"
    fill="${fill}" stroke="${stroke}" stroke-width="${STROKE_W}"`;
    if (masked) a += ` mask="url(#centerMask)"`;
    if (dashed) {
      a += ` stroke-dasharray="${dl} ${dg}" stroke-linecap="round"`;
      if (spd !== 0) {
        const circ = 2*Math.PI*(p.rx+p.ry)/2;
        const dur = Math.abs(circ/(60*spd));
        const to = spd>0 ? circ.toFixed(0) : (-circ).toFixed(0);
        return `  <ellipse ${a}>\n    <animate attributeName="stroke-dashoffset" from="0" to="${to}" dur="${dur.toFixed(1)}s" repeatCount="indefinite"/>\n  </ellipse>`;
      }
    }
    return `  <ellipse ${a}/>`;
  }

  // Build mask — white rect + black ellipse matching centre solid
  const csProj = projectRing(cSolidN);
  const maskDef = `  <defs>
    <mask id="centerMask" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="710" height="681">
      <rect x="0" y="0" width="710" height="681" fill="white"/>
      <ellipse cx="${CX}" cy="${CY}" rx="${csProj.rx.toFixed(2)}" ry="${csProj.ry.toFixed(2)}"
        transform="rotate(${csProj.angle.toFixed(2)} ${CX} ${CY})"
        fill="black" fill-opacity="${state.cSolidFill}"/>
    </mask>
  </defs>`;

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="710" height="681" viewBox="0 0 710 681" xmlns="http://www.w3.org/2000/svg">
${bg!=='none'?`  <rect width="710" height="681" fill="${bg}"/>`:''}
${maskDef}
${tag(oSolidN, 'none')}
${tag(oDashN, 'none', true, state.oDashLen, state.oDashGap, state.oDashSpd, true)}
${tag(cDashN, 'none', true, state.cDashLen, state.cDashGap, state.cDashSpd, true)}
${tag(cSolidN, 'none')}
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dd-monogram-animated.svg'; a.click();
  URL.revokeObjectURL(url);
});

// Copy All Settings button
document.getElementById('copyStateBtn').addEventListener('click', () => {
  const out = {};
  for (const key of PRESET_KEYS) {
    out[key] = state[key];
  }
  const text = JSON.stringify(out, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyStateBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy All Settings', 1500);
  });
});

// Saved presets (localStorage)
const STORAGE_KEY = 'dd-ring-presets';

function loadSavedPresets() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveSavedPresets(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function renderSavedPresets() {
  const container = document.getElementById('savedPresets');
  const list = loadSavedPresets();
  container.innerHTML = '';
  if (list.length === 0) {
    container.innerHTML = '<span style="opacity:0.3;font-size:11px">No saved presets yet</span>';
    return;
  }
  list.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'saved-preset';
    el.innerHTML = `<span class="name">${p.name}</span><span class="del">&times;</span>`;
    el.querySelector('.name').addEventListener('click', () => {
      // Apply saved preset
      for (const key of PRESET_KEYS) {
        if (p.state[key] !== undefined) state[key] = p.state[key];
      }
      syncAllSliders();
      oDashZAngle = 0; cDashZAngle = 0; cSolidZAngle = 0;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });
    el.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      const all = loadSavedPresets();
      all.splice(i, 1);
      saveSavedPresets(all);
      renderSavedPresets();
    });
    container.appendChild(el);
  });
}

function syncAllSliders() {
  document.querySelectorAll('.control-row input[type="range"]').forEach(input => {
    const key = input.dataset.key;
    if (!key || state[key] === undefined) return;
    input.value = state[key];
    if (key === 'cSolidPPOn') {
      input.nextElementSibling.textContent = state[key] ? 'On' : 'Off';
    } else {
      const isDeg = key.match(/SolidX|SolidY|SolidZ|DashX|DashY|DashZTlt|PPMin|PPMax|maskRotOff/) && !key.match(/Spd|Spn|Len|Gap|Fill|Scale|Off[XY]/);
      if (isDeg) {
        input.nextElementSibling.innerHTML = state[key] + '&deg;';
      } else {
        const v = state[key];
        input.nextElementSibling.textContent = Number.isInteger(v) ? v : v.toFixed(1);
      }
    }
  });
  // Sync select dropdowns
  document.querySelectorAll('.control-row select').forEach(sel => {
    const key = sel.dataset.key;
    if (!key || state[key] === undefined) return;
    sel.value = state[key];
    sel.nextElementSibling.textContent = state[key];
  });
}

document.getElementById('savePresetBtn').addEventListener('click', () => {
  const name = prompt('Preset name:');
  if (!name) return;
  const all = loadSavedPresets();
  all.push({ name, state: { ...state } });
  saveSavedPresets(all);
  renderSavedPresets();
});

renderSavedPresets();
applyPreset(2); // V4
buildSVG();
requestAnimationFrame(animate);
</script>

</body>
